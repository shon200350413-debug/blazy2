<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Vampiro+One&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: rgba(0,0,0,0); /* 🔥 force transparency */
  overflow: hidden;
}

/* Center */
#container {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Neon text */
a {
  font-family: 'Vampiro One', cursive;
  font-size: 120px;
  color: #ffffff;
  text-decoration: none;

  animation: neon6 1.5s ease-in-out infinite alternate;
}

/* Glow */
@keyframes neon6 {
  from {
    text-shadow:
      0 0 10px #fff,
      0 0 20px #fff,
      0 0 30px #fff,
      0 0 40px #ff00de,
      0 0 70px #ff00de,
      0 0 80px #ff00de,
      0 0 100px #ff00de,
      0 0 150px #ff00de;
  }
  to {
    text-shadow:
      0 0 5px #fff,
      0 0 10px #fff,
      0 0 15px #fff,
      0 0 20px #ff00de,
      0 0 35px #ff00de,
      0 0 40px #ff00de,
      0 0 50px #ff00de,
      0 0 75px #ff00de;
  }
}
</style>
</head>

<body>
  <div id="container">
    <a>Blazy Susan</a>
  </div>
</body>
</html>
